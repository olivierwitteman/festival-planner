name: Refresh ICS calendars

on:
  schedule:
    - cron: '0 5 * * *'              # daily at 05:00 UTC (07:00 CEST), year-round
    - cron: '*/15 * 12-15 6 *'       # every 15 min, 12–15 June (BKS weekend + Mon morning)
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: refresh-ics
  cancel-in-progress: true

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate ICS files
        env:
          # Optional overrides — script falls back to config.js if these are unset.
          JSONBIN_BIN_ID:  ${{ secrets.JSONBIN_BIN_ID }}
          JSONBIN_API_KEY: ${{ secrets.JSONBIN_API_KEY }}
        run: node scripts/generate-ics.mjs

      - name: Commit and push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add calendar/
          if git diff --staged --quiet; then
            echo "No calendar changes."
          else
            git commit -m "chore: refresh ICS calendars [skip ci]"
            git push
          fi
