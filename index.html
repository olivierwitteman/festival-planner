<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Festival Planner 🎪</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:       #0a0a0a;
    --surface:  #141414;
    --surface2: #1e1e1e;
    --border:   #2a2a2a;
    --text:     #f0f0f0;
    --muted:    #666;
    --accent:   #FF5C4D;
    --accent2:  #FFD166;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Space Mono', monospace;
    font-size: 13px;
    min-height: 100vh;
  }

  /* ── HEADER ──────────────────────────────────────────────────── */
  #header {
    background: var(--surface);
    border-bottom: 2px solid var(--border);
    padding: 14px 16px 12px;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  #header h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    letter-spacing: 4px;
    color: #fff;
    line-height: 1;
  }

  .subtitle {
    font-size: 10px;
    color: var(--muted);
    margin-top: 4px;
    letter-spacing: 1px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .sync-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: #4CAF50;
    flex-shrink: 0;
  }
  .sync-dot.syncing { background: var(--accent2); animation: pulse 1s infinite; }
  .sync-dot.offline { background: var(--muted); }
  @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.3; } }

  /* ── NAME BAR ────────────────────────────────────────────────── */
  #name-bar {
    display: flex;
    gap: 8px;
    margin-top: 12px;
    align-items: center;
  }

  #name-input {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 8px 12px;
    color: var(--text);
    font-family: inherit;
    font-size: 12px;
    outline: none;
    transition: border-color 0.15s;
    min-width: 0;
  }
  #name-input:focus { border-color: var(--accent); }
  #name-input::placeholder { color: var(--muted); }

  #join-btn {
    background: var(--accent);
    border: none;
    border-radius: 6px;
    padding: 8px 18px;
    color: #fff;
    cursor: pointer;
    font-family: inherit;
    font-size: 12px;
    font-weight: 700;
    white-space: nowrap;
    flex-shrink: 0;
    transition: opacity 0.15s;
  }
  #join-btn:hover { opacity: 0.85; }

  #active-user {
    display: none;
    align-items: center;
    gap: 8px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 6px 14px;
    margin-top: 12px;
    width: fit-content;
  }
  #user-dot   { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  #user-label { font-size: 12px; color: var(--text); }
  #leave-btn  {
    background: none; border: none; color: var(--muted);
    cursor: pointer; font-size: 14px; padding: 0; line-height: 1;
  }
  #leave-btn:hover { color: var(--text); }

  /* ── TABS ────────────────────────────────────────────────────── */
  #tabs {
    display: flex;
    gap: 4px;
    margin-top: 12px;
    flex-wrap: wrap;
    align-items: center;
  }

  .tab {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 6px 14px;
    color: var(--muted);
    cursor: pointer;
    font-family: inherit;
    font-size: 11px;
    line-height: 1.4;
    transition: all 0.15s;
  }
  .tab:hover { color: var(--text); border-color: #444; }
  .tab.active { background: var(--accent); border-color: var(--accent); color: #fff; font-weight: 700; }

  .view-toggle { margin-left: auto; display: flex; gap: 4px; }

  .vtab {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 6px 12px;
    color: var(--muted);
    cursor: pointer;
    font-family: inherit;
    font-size: 11px;
    transition: all 0.15s;
  }
  .vtab:hover { color: var(--text); }
  .vtab.active { background: #333; border-color: #555; color: #fff; }

  /* ── MEMBERS BAR ─────────────────────────────────────────────── */
  #members-bar {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-top: 10px;
    align-items: center;
    min-height: 26px;
  }

  .filter-label { font-size: 10px; color: #444; letter-spacing: 1px; flex-shrink: 0; }

  .chip {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    border-radius: 20px;
    padding: 4px 11px;
    cursor: pointer;
    font-family: inherit;
    font-size: 11px;
    border: 1.5px solid var(--border);
    color: var(--muted);
    background: none;
    transition: all 0.15s;
    line-height: 1;
  }
  .chip:hover  { border-color: #555; color: var(--text); }
  .chip.active { border-color: #fff; color: #fff; background: var(--border); }

  .chip-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }

  /* ── CONTENT ─────────────────────────────────────────────────── */
  #content { padding: 14px 16px 40px; }

  #loading {
    text-align: center;
    padding: 48px;
    color: var(--muted);
    font-size: 11px;
    letter-spacing: 3px;
  }

  /* ── STAGE GRID ──────────────────────────────────────────────── */
  .stage-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(175px, 1fr));
    gap: 12px;
  }

  .stage-col {
    background: var(--surface);
    border-radius: 10px;
    overflow: hidden;
    border: 1px solid var(--border);
  }

  .stage-header {
    background: var(--surface2);
    padding: 7px 10px;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 2px;
    color: #888;
    text-transform: uppercase;
    border-bottom: 1px solid var(--border);
  }

  .stage-acts { padding: 8px; display: flex; flex-direction: column; gap: 5px; }

  /* ── ACT CARD ────────────────────────────────────────────────── */
  .act-card {
    background: var(--surface2);
    border: 1.5px solid var(--border);
    border-radius: 8px;
    padding: 8px 10px;
    cursor: pointer;
    transition: border-color 0.12s, background 0.12s;
    user-select: none;
  }
  .act-card:hover { border-color: #444; }

  .act-name {
    font-size: 12px;
    font-weight: 700;
    color: #bbb;
    line-height: 1.35;
  }
  .act-card.marked .act-name { color: #fff; }

  .act-time { font-size: 10px; color: var(--muted); margin-top: 3px; }

  .act-dots { display: flex; gap: 3px; margin-top: 6px; flex-wrap: wrap; }

  .act-dot {
    width: 16px; height: 16px;
    border-radius: 50%;
    border: 2px solid var(--bg);
    display: flex; align-items: center; justify-content: center;
    font-size: 8px; font-weight: 700; color: #000;
    flex-shrink: 0;
  }

  /* ── SUMMARY ─────────────────────────────────────────────────── */
  .summary-person { margin-bottom: 24px; }

  .summary-person h3 {
    font-size: 12px;
    letter-spacing: 2px;
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .s-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }

  .summary-acts { display: flex; flex-wrap: wrap; gap: 6px; }

  .summary-tag {
    border-radius: 6px;
    padding: 5px 10px;
    font-size: 11px;
    border: 1px solid;
    line-height: 1.5;
  }
  .s-stage { font-size: 9px; letter-spacing: 1px; display: block; }
  .s-time  { font-size: 10px; color: var(--muted); display: block; margin-top: 1px; }

  .empty-msg { color: #333; padding: 24px 0; font-size: 11px; letter-spacing: 1px; }

  /* ── MOBILE ──────────────────────────────────────────────────── */
  @media (max-width: 480px) {
    .stage-grid { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 8px; }
    #header h1  { font-size: 22px; }
    .tab        { padding: 5px 10px; }
  }
</style>
</head>
<body>

<div id="header">
  <h1>🎪 FESTIVAL PLANNER</h1>
  <div class="subtitle">
    <span class="sync-dot" id="sync-dot"></span>
    <span id="sync-label">connecting…</span>
  </div>

  <div id="name-bar">
    <input type="text" id="name-input" placeholder="Your name to start marking…" maxlength="20" autocomplete="off">
    <button id="join-btn" onclick="joinFestival()">Join</button>
  </div>

  <div id="active-user">
    <div id="user-dot"></div>
    <span id="user-label"></span>
    <button id="leave-btn" onclick="leaveSession()" title="Leave">✕</button>
  </div>

  <div id="tabs">
    <button class="tab active" onclick="setDay('friday',   this)">Fri 12/06</button>
    <button class="tab"        onclick="setDay('saturday', this)">Sat 13/06</button>
    <button class="tab"        onclick="setDay('sunday',   this)">Sun 14/06</button>
    <div class="view-toggle">
      <button class="vtab active" id="vt-stage"   onclick="setView('stage')">Stage</button>
      <button class="vtab"        id="vt-summary" onclick="setView('summary')">Summary</button>
    </div>
  </div>

  <div id="members-bar">
    <span class="filter-label">FILTER:</span>
    <button class="chip active" id="chip-all" onclick="setFilter('all')">
      <span class="chip-dot" style="background:#666"></span>All
    </button>
  </div>
</div>

<div id="content">
  <div id="loading">LOADING LINEUP…</div>
  <div id="stage-view"   style="display:none"></div>
  <div id="summary-view" style="display:none"></div>
</div>

// ─── STATE ────────────────────────────────────────────────────────────────────
let db         = { marks: {}, members: {} };
let myName     = localStorage.getItem('fp_name')  || '';
let myColor    = localStorage.getItem('fp_color') || '';
let activeDay  = 'friday';
let activeView = 'stage';
let filterBy   = 'all';

// ─── SYNC ─────────────────────────────────────────────────────────────────────
const configured = typeof JSONBIN_BIN_ID !== 'undefined'
                && JSONBIN_BIN_ID  !== 'YOUR_BIN_ID_HERE'
                && JSONBIN_API_KEY !== 'YOUR_API_KEY_HERE';

function syncUI(state, label) {
  document.getElementById('sync-dot').className   = 'sync-dot' + (state !== 'ok' ? ' ' + state : '');
  document.getElementById('sync-label').textContent = label;
}

async function loadDB() {
  if (!configured) {
    const s = localStorage.getItem('fp_state');
    if (s) db = JSON.parse(s);
    syncUI('offline', 'local mode — see README to enable sync');
    return;
  }
  try {
    syncUI('syncing', 'syncing…');
    const r = await fetch(`https://api.jsonbin.io/v3/b/${JSONBIN_BIN_ID}/latest`, {
      headers: { 'X-Access-Key': JSONBIN_API_KEY }
    });
    if (!r.ok) throw new Error(r.status);
    db = (await r.json()).record || { marks:{}, members:{} };
    syncUI('ok', 'synced');
  } catch {
    syncUI('offline', 'offline');
  }
}

// Debounced save: rapid clicks collapse into one write of the final state
let saveTimer = null;
function saveDB() {
  if (!configured) {
    localStorage.setItem('fp_state', JSON.stringify(db));
    return;
  }
  syncUI('syncing', 'saving…');
  clearTimeout(saveTimer);
  saveTimer = setTimeout(async () => {
    const snapshot = JSON.stringify(db);
    try {
      const r = await fetch(`https://api.jsonbin.io/v3/b/${JSONBIN_BIN_ID}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json', 'X-Access-Key': JSONBIN_API_KEY },
        body: snapshot
      });
      if (!r.ok) throw new Error(r.status);
      syncUI('ok', 'saved');
    } catch {
      syncUI('offline', 'save failed');
    }
  }, 600);
}

// ─── USER ─────────────────────────────────────────────────────────────────────
function joinFestival() {
  const name = document.getElementById('name-input').value.trim();
  if (!name) return;
  const color = db.members[name] || PALETTE[Object.keys(db.members).length % PALETTE.length];
  myName  = name;
  myColor = color;
  db.members[name] = color;
  localStorage.setItem('fp_name',  name);
  localStorage.setItem('fp_color', color);
  saveDB();
  updateUserBar();
  render();
}

function leaveSession() {
  myName = ''; myColor = '';
  localStorage.removeItem('fp_name');
  localStorage.removeItem('fp_color');
  updateUserBar();
  render();
}

function updateUserBar() {
  const bar    = document.getElementById('name-bar');
  const active = document.getElementById('active-user');
  if (myName) {
    bar.style.display    = 'none';
    active.style.display = 'flex';
    document.getElementById('user-dot').style.background = myColor;
    document.getElementById('user-label').textContent    = myName;
  } else {
    bar.style.display    = 'flex';
    active.style.display = 'none';
  }
}

// ─── CONTROLS ─────────────────────────────────────────────────────────────────
function toggleMark(actId) {
  if (!myName) { document.getElementById('name-input').focus(); return; }
  const list = db.marks[actId] ? [...db.marks[actId]] : [];
  const idx  = list.indexOf(myName);
  if (idx >= 0) list.splice(idx, 1); else list.push(myName);
  if (list.length === 0) delete db.marks[actId]; else db.marks[actId] = list;
  render();
  saveDB();
}

function setDay(day, el) {
  activeDay = day;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  render();
}

function setView(v) {
  activeView = v;
  document.getElementById('vt-stage').classList.toggle('active',   v === 'stage');
  document.getElementById('vt-summary').classList.toggle('active', v === 'summary');
  render();
}

function setFilter(name) {
  filterBy = name;
  render();
}

// ─── HELPERS ──────────────────────────────────────────────────────────────────
function colorOf(name) {
  return db.members[name] || PALETTE[Object.keys(db.members).indexOf(name) % PALETTE.length] || '#888';
}

function rgba(hex, a) {
  const [r,g,b] = [1,3,5].map(i => parseInt(hex.slice(i,i+2),16));
  return `rgba(${r},${g},${b},${a})`;
}

// ─── RENDER ───────────────────────────────────────────────────────────────────
function render() {
  document.getElementById('loading').style.display = 'none';
  renderMembersBar();
  document.getElementById('stage-view').style.display   = activeView === 'stage'   ? 'block' : 'none';
  document.getElementById('summary-view').style.display = activeView === 'summary' ? 'block' : 'none';
  activeView === 'stage' ? renderStageView() : renderSummaryView();
}

function renderMembersBar() {
  const bar = document.getElementById('members-bar');
  bar.querySelectorAll('.mchip').forEach(c => c.remove());

  // all-chip
  const allChip = document.getElementById('chip-all');
  if (filterBy === 'all') {
    allChip.classList.add('active');
    allChip.style.cssText = '';
  } else {
    allChip.classList.remove('active');
  }

  const members = [...new Set(Object.values(db.marks).flat())];
  members.forEach(name => {
    const color   = colorOf(name);
    const count   = Object.values(db.marks).filter(v => v.includes(name)).length;
    const active  = filterBy === name;
    const btn     = document.createElement('button');
    btn.className = 'chip mchip' + (active ? ' active' : '');
    btn.style.borderColor = color;
    btn.style.color       = '#fff';
    if (active) btn.style.background = rgba(color, 0.2);
    btn.innerHTML = `<span class="chip-dot" style="background:${color}"></span>${name} <span style="opacity:0.55">(${count})</span>`;
    btn.onclick   = () => setFilter(filterBy === name ? 'all' : name);
    bar.appendChild(btn);
  });
}

function renderStageView() {
  const day  = DAYS[activeDay];
  const acts = filterBy === 'all'
    ? day.acts
    : day.acts.filter(a => (db.marks[a.id] || []).includes(filterBy));

  const byStage = Object.fromEntries(day.stages.map(s => [s, []]));
  acts.forEach(a => { if (byStage[a.stage]) byStage[a.stage].push(a); });

  const cols = day.stages.map(stage => {
    const stageActs = byStage[stage].sort((a,b) => a.start.localeCompare(b.start));
    if (!stageActs.length && filterBy !== 'all') return '';
    const cards = stageActs.length
      ? stageActs.map(renderCard).join('')
      : '<div style="padding:8px 4px;font-size:10px;color:#2a2a2a">—</div>';
    return `<div class="stage-col">
      <div class="stage-header">${stage}</div>
      <div class="stage-acts">${cards}</div>
    </div>`;
  }).join('');

  document.getElementById('stage-view').innerHTML = `<div class="stage-grid">${cols}</div>`;
}

function renderCard(act) {
  const members  = db.marks[act.id] || [];
  const isMarked = myName && members.includes(myName);
  const mc       = myName ? (db.members[myName] || myColor || PALETTE[0]) : PALETTE[0];

  const style = isMarked
    ? `style="background:${rgba(mc,0.12)};border-color:${mc}"`
    : '';

  const dots = members.map(n => {
    const c = colorOf(n);
    return `<span class="act-dot" style="background:${c}" title="${n}">${n[0].toUpperCase()}</span>`;
  }).join('');

  return `<div class="act-card${isMarked?' marked':''}" ${style} onclick="toggleMark('${act.id}')">
    <div class="act-name">${act.name}</div>
    <div class="act-time">${act.start}–${act.end}</div>
    ${dots ? `<div class="act-dots">${dots}</div>` : ''}
  </div>`;
}

function renderSummaryView() {
  const members = [...new Set(Object.values(db.marks).flat())];
  if (!members.length) {
    document.getElementById('summary-view').innerHTML =
      '<div class="empty-msg">NO PICKS YET — START MARKING ACTS</div>';
    return;
  }

  const allActs = Object.values(DAYS).flatMap(d => d.acts);

  const html = members.map(name => {
    const color  = colorOf(name);
    const picked = Object.entries(db.marks)
      .filter(([,v]) => v.includes(name))
      .map(([id]) => allActs.find(a => a.id === id))
      .filter(Boolean)
      .sort((a,b) => a.start.localeCompare(b.start));

    const tags = picked.map(a =>
      `<div class="summary-tag" style="border-color:${rgba(color,0.3)}">
        <span class="s-stage" style="color:${color}">${a.stage}</span>
        ${a.name}
        <span class="s-time">${a.start}–${a.end}</span>
      </div>`
    ).join('');

    return `<div class="summary-person">
      <h3 style="color:${color}">
        <span class="s-dot" style="background:${color}"></span>
        ${name} — ${picked.length} act${picked.length !== 1 ? 's' : ''}
      </h3>
      <div class="summary-acts">${tags}</div>
    </div>`;
  }).join('');

  document.getElementById('summary-view').innerHTML = html;
}

// ─── BOOT ─────────────────────────────────────────────────────────────────────
document.getElementById('name-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') joinFestival();
});

if (myName) updateUserBar();

loadDB().then(() => {
  if (myName && db.members[myName]) myColor = db.members[myName];
  render();
  if (configured) setInterval(() => loadDB().then(render), POLL_MS);
});
</script>
