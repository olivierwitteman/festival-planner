<html lang="en">
<head>

     og:image MUST be an absolute URL — update it if you fork to a different host. -->

<meta name="twitter:card"        content="summary_large_image">
<meta name="twitter:title"       content="BKS '26 — Best Kept Secret Planner">
<meta name="twitter:description" content="Plan Best Kept Secret '26 with your friends. Mark acts, find each other on-site, share what to bring.">
<meta name="twitter:image"       content="https://olivierwitteman.github.io/festival-planner/og-image.png">

<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:       #0a0a0a;
    --surface:  #141414;
    --surface2: #1e1e1e;
    --border:   #2a2a2a;
    --text:     #f0f0f0;
    --muted:    #666;
    --accent:   #FF5C4D;
    --accent2:  #FFD166;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Space Mono', monospace;
    font-size: 13px;
    min-height: 100vh;
  }

  /* ── HEADER ──────────────────────────────────────────────────── */
  #header {
    background: var(--surface);
    border-bottom: 2px solid var(--border);
    padding: 14px 16px 12px;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  #header h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    letter-spacing: 4px;
    color: #fff;
    line-height: 1;
  }

  .subtitle {
    font-size: 10px;
    color: var(--muted);
    margin-top: 4px;
    letter-spacing: 1px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .sync-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: #4CAF50;
    flex-shrink: 0;
  }
  .sync-dot.syncing { background: var(--accent2); animation: pulse 1s infinite; }
  .sync-dot.offline { background: var(--muted); }
  @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.3; } }

  /* ── NAME BAR ────────────────────────────────────────────────── */
  #name-bar {
    display: flex;
    gap: 8px;
    margin-top: 12px;
    align-items: center;
  }

  #name-input {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 8px 12px;
    color: var(--text);
    font-family: inherit;
    font-size: 12px;
    outline: none;
    transition: border-color 0.15s;
    min-width: 0;
  }
  #name-input:focus { border-color: var(--accent); }
  #name-input::placeholder { color: var(--muted); }

  #join-btn {
    background: var(--accent);
    border: none;
    border-radius: 6px;
    padding: 8px 18px;
    color: #fff;
    cursor: pointer;
    font-family: inherit;
    font-size: 12px;
    font-weight: 700;
    white-space: nowrap;
    flex-shrink: 0;
    transition: opacity 0.15s;
  }
  #join-btn:hover { opacity: 0.85; }

  #existing-members {
    display: none;
    flex-wrap: wrap;
    gap: 6px;
    margin-top: 8px;
    align-items: center;
  }
  #existing-members .chip { cursor: pointer; }

  #active-user {
    display: none;
    align-items: center;
    gap: 8px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 6px 14px;
    margin-top: 12px;
    width: fit-content;
  }
  #user-dot   { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  #user-label { font-size: 12px; color: var(--text); }
  #leave-btn  {
    background: none; border: none; color: var(--muted);
    cursor: pointer; font-size: 14px; padding: 0; line-height: 1;
  }
  #leave-btn:hover { color: var(--text); }

  /* ── TABS ────────────────────────────────────────────────────── */
  #tabs {
    display: flex;
    gap: 4px;
    margin-top: 12px;
    flex-wrap: wrap;
    align-items: center;
  }

  .tab {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 6px 14px;
    color: var(--muted);
    cursor: pointer;
    font-family: inherit;
    font-size: 11px;
    line-height: 1.4;
    transition: all 0.15s;
  }
  .tab:hover { color: var(--text); border-color: #444; }
  .tab.active { background: var(--accent); border-color: var(--accent); color: #fff; font-weight: 700; }

  .view-toggle { margin-left: auto; display: flex; gap: 4px; }

  .vtab {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 6px 12px;
    color: var(--muted);
    cursor: pointer;
    font-family: inherit;
    font-size: 11px;
    transition: all 0.15s;
  }
  .vtab:hover { color: var(--text); }
  .vtab.active { background: #333; border-color: #555; color: #fff; }

  /* ── MEMBERS BAR ─────────────────────────────────────────────── */
  #members-bar {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-top: 10px;
    align-items: center;
    min-height: 26px;
  }

  .filter-label { font-size: 10px; color: #444; letter-spacing: 1px; flex-shrink: 0; }

  .chip {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    border-radius: 20px;
    padding: 4px 11px;
    cursor: pointer;
    font-family: inherit;
    font-size: 11px;
    border: 1.5px solid var(--border);
    color: var(--muted);
    background: none;
    transition: all 0.15s;
    line-height: 1;
  }
  .chip:hover  { border-color: #555; color: var(--text); }
  .chip.active { border-color: #fff; color: #fff; background: var(--border); }

  .picked-chip.active {
    border-color: var(--accent2);
    color: #000;
    background: var(--accent2);
    font-weight: 700;
  }

  .chip-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }

  /* Day tabs and FILTER row only make sense on the Stage view. */
  body:not([data-view="stage"]):not([data-view="flow"]) #tabs .tab    { display: none; }
  body:not([data-view="stage"]):not([data-view="flow"]) #members-bar  { display: none; }

  /* ── CONTENT ─────────────────────────────────────────────────── */
  #content { padding: 14px 16px 40px; }

  #loading {
    text-align: center;
    padding: 48px;
    color: var(--muted);
    font-size: 11px;
    letter-spacing: 3px;
  }

  /* ── STAGE GRID ──────────────────────────────────────────────── */
  .stage-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(175px, 1fr));
    gap: 12px;
  }

  .stage-col {
    background: var(--surface);
    border-radius: 10px;
    overflow: hidden;
    border: 1px solid var(--border);
  }

  .stage-header {
    background: var(--surface2);
    padding: 7px 10px;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 2px;
    color: #888;
    text-transform: uppercase;
    border-bottom: 1px solid var(--border);
  }

  .stage-acts { padding: 8px; display: flex; flex-direction: column; gap: 5px; }

  /* ── ACT CARD ────────────────────────────────────────────────── */
  .act-card {
    background: var(--surface2);
    border: 1.5px solid var(--border);
    border-radius: 8px;
    padding: 8px 10px;
    cursor: pointer;
    transition: border-color 0.12s, background 0.12s;
    user-select: none;
  }
  .act-card:hover { border-color: #444; }

  .act-name {
    font-size: 12px;
    font-weight: 700;
    color: #bbb;
    line-height: 1.35;
  }
  .act-card.marked .act-name { color: #fff; }

  .act-time { font-size: 10px; color: var(--muted); margin-top: 3px; }

  .act-dots { display: flex; gap: 3px; margin-top: 6px; flex-wrap: wrap; }

  .act-dot {
    width: 16px; height: 16px;
    border-radius: 50%;
    border: 2px solid var(--bg);
    display: flex; align-items: center; justify-content: center;
    font-size: 8px; font-weight: 700;
    flex-shrink: 0;
  }

  /* ── SUMMARY ─────────────────────────────────────────────────── */
  .summary-person { margin-bottom: 24px; }

  .summary-person h3 {
    font-size: 12px;
    letter-spacing: 2px;
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .s-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }

  .summary-acts { display: flex; flex-wrap: wrap; gap: 6px; }

  .summary-tag {
    border-radius: 6px;
    padding: 5px 10px;
    font-size: 11px;
    border: 1px solid;
    line-height: 1.5;
  }
  .s-stage { font-size: 9px; letter-spacing: 1px; display: block; }
  .s-time  { font-size: 10px; color: var(--muted); display: block; margin-top: 1px; }

  .empty-msg { color: #333; padding: 24px 0; font-size: 11px; letter-spacing: 1px; }

  /* ── SUBSCRIBE CTA ───────────────────────────────────────────── */
  .subscribe-cta {
    display: flex;
    align-items: center;
    gap: 18px;
    padding: 18px 20px;
    margin-bottom: 18px;
    background:
      linear-gradient(135deg, rgba(255,92,77,0.18), rgba(255,209,102,0.08));
    border: 1px solid var(--accent);
    border-radius: 12px;
    flex-wrap: wrap;
    box-shadow: 0 0 0 1px rgba(255,92,77,0.15), 0 8px 24px rgba(255,92,77,0.08);
  }
  .subscribe-cta-icon {
    font-size: 28px;
    line-height: 1;
    flex-shrink: 0;
  }
  .subscribe-cta-text { flex: 1; min-width: 180px; }
  .subscribe-cta-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    letter-spacing: 3px;
    color: #fff;
    line-height: 1.1;
  }
  .subscribe-cta-sub {
    font-size: 11px;
    color: #bbb;
    line-height: 1.5;
    margin-top: 4px;
  }
  .subscribe-btn {
    background: var(--accent);
    border: none;
    border-radius: 8px;
    padding: 12px 22px;
    color: #fff;
    font-family: inherit;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 2px;
    cursor: pointer;
    text-decoration: none;
    transition: transform 0.12s ease, box-shadow 0.12s ease, opacity 0.12s ease;
    white-space: nowrap;
    box-shadow: 0 2px 14px rgba(255,92,77,0.45);
    flex-shrink: 0;
  }
  .subscribe-btn:hover  { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(255,92,77,0.6); }
  .subscribe-btn:active { transform: translateY(0); opacity: 0.92; }

  .summary-stats {
    display: flex;
    align-items: center;
    flex-wrap: wrap;
    gap: 8px 12px;
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 18px;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--border);
  }

  /* Slim subscribe pill — used on Summary; the prominent CTA lives on Home. */
  .subscribe-pill {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    margin-left: auto;
    background: transparent;
    border: 1px solid var(--accent);
    color: var(--accent);
    border-radius: 20px;
    padding: 4px 11px;
    font-family: inherit;
    font-size: 10px;
    letter-spacing: 1.5px;
    font-weight: 700;
    text-decoration: none;
    transition: background 0.15s, color 0.15s;
    white-space: nowrap;
  }
  .subscribe-pill:hover { background: rgba(255,92,77,0.15); color: #fff; }

  /* ── MOBILE ──────────────────────────────────────────────────── */
  @media (max-width: 480px) {
    .stage-grid { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 8px; }
    #header h1  { font-size: 22px; }
    .tab        { padding: 5px 10px; }
  }

  /* ── BKS BRAND ───────────────────────────────────────────────── */
  #bks-brand {
    display: flex;
    align-items: baseline;
    gap: 10px;
    line-height: 1;
  }
  #bks-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 30px;
    letter-spacing: 5px;
    color: #fff;
  }
  #bks-year {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 20px;
    letter-spacing: 3px;
    color: var(--accent);
  }
  #bks-sub {
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 2px;
    margin-top: 2px;
    margin-bottom: 0;
  }

  /* ── HOME / OVERVIEW ─────────────────────────────────────────── */
  #home-view { display: flex; flex-direction: column; gap: 16px; }

  .home-hero {
    background:
      radial-gradient(circle at 20% 0%, rgba(255,209,102,0.12), transparent 55%),
      linear-gradient(135deg, rgba(255,92,77,0.22) 0%, rgba(255,92,77,0.04) 100%);
    border: 1px solid rgba(255,92,77,0.4);
    border-radius: 14px;
    padding: 22px 22px 20px;
    text-align: center;
  }
  .home-hero-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    letter-spacing: 4px;
    color: #fff;
    line-height: 1.05;
  }
  .home-hero-sub {
    font-size: 12px;
    color: var(--text);
    margin-top: 8px;
    line-height: 1.6;
    max-width: 540px;
    margin-left: auto;
    margin-right: auto;
  }
  .home-hero-prompt {
    margin-top: 14px;
    font-size: 11px;
    letter-spacing: 1.5px;
    color: var(--accent2);
    text-transform: uppercase;
    line-height: 1.4;
  }

  .home-stats {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 4px 14px;
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--muted);
    text-transform: uppercase;
  }
  .home-stats strong { color: var(--text); font-weight: 700; }
  .home-stats span:not(:last-child)::after {
    content: '·';
    margin-left: 14px;
    color: #2a2a2a;
  }

  .home-features {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 10px;
  }
  .home-feature {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px;
    cursor: pointer;
    transition: border-color 0.15s, transform 0.12s, background 0.15s;
    display: flex;
    flex-direction: column;
    gap: 6px;
    text-align: left;
    font-family: inherit;
    color: inherit;
  }
  .home-feature:hover {
    border-color: #555;
    transform: translateY(-1px);
    background: var(--surface2);
  }
  .home-feature-icon { font-size: 22px; line-height: 1; }
  .home-feature-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 18px;
    letter-spacing: 2.5px;
    color: #fff;
    line-height: 1;
  }
  .home-feature-desc {
    font-size: 11px;
    color: var(--muted);
    line-height: 1.55;
  }
  .home-feature-cta {
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--accent);
    margin-top: auto;
    padding-top: 4px;
    text-transform: uppercase;
  }

  .home-steps {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 18px 16px;
  }
  .home-steps-title {
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 10px;
  }
  .home-steps ol {
    list-style: none;
    counter-reset: step;
    display: flex;
    flex-direction: column;
    gap: 10px;
    padding: 0;
    margin: 0;
  }
  .home-steps li {
    counter-increment: step;
    font-size: 12px;
    color: #ccc;
    line-height: 1.55;
    padding-left: 30px;
    position: relative;
  }
  .home-steps li::before {
    content: counter(step);
    position: absolute;
    left: 0; top: 0;
    width: 22px; height: 22px;
    border-radius: 50%;
    background: var(--accent);
    color: #fff;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    line-height: 1;
  }
  .home-steps strong { color: #fff; font-weight: 700; }

  .countdown-heading {
    font-size: 9px;
    letter-spacing: 2px;
    color: var(--muted);
    text-transform: uppercase;
    margin-top: 16px;
  }
  .countdown {
    display: flex;
    justify-content: center;
    align-items: flex-start;
    gap: 2px;
    margin-top: 6px;
  }
  .countdown-unit {
    display: flex;
    flex-direction: column;
    align-items: center;
    min-width: 50px;
  }
  .countdown-num {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 38px;
    line-height: 1;
    color: #fff;
    letter-spacing: 1px;
  }
  .countdown-label {
    font-size: 8px;
    letter-spacing: 2px;
    color: var(--muted);
    text-transform: uppercase;
    margin-top: 3px;
  }
  .countdown-sep {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 30px;
    color: rgba(255,92,77,0.6);
    padding: 0 2px;
    line-height: 1.2;
  }
  .countdown-live {
    font-size: 13px;
    letter-spacing: 3px;
    color: var(--accent2);
    text-transform: uppercase;
    padding: 10px 0 4px;
  }

  .install-cta {
    display: flex;
    align-items: center;
    gap: 12px;
    background: var(--surface);
    border: 1px solid rgba(255,92,77,0.3);
    border-radius: 10px;
    padding: 12px 14px;
  }
  .install-cta-icon { font-size: 22px; flex-shrink: 0; line-height: 1; }
  .install-cta-body { flex: 1; min-width: 0; }
  .install-cta-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 14px;
    letter-spacing: 2px;
    color: #fff;
    line-height: 1;
  }
  .install-cta-desc {
    font-size: 11px;
    color: var(--muted);
    margin-top: 3px;
    line-height: 1.45;
  }
  .install-cta-desc strong { color: var(--text); font-weight: 700; }
  .install-cta-btn {
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 6px;
    padding: 7px 13px;
    font-family: inherit;
    font-size: 11px;
    letter-spacing: 1px;
    text-transform: uppercase;
    cursor: pointer;
    flex-shrink: 0;
    transition: opacity 0.15s;
  }
  .install-cta-btn:hover { opacity: 0.8; }
  .install-cta-dismiss {
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 15px;
    padding: 2px 4px;
    flex-shrink: 0;
    line-height: 1;
  }
  .install-cta-dismiss:hover { color: var(--text); }

  /* ── FLOW / TIMELINE VIEW ───────────────────────────────────── */
  #flow-view {
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    position: relative;
    padding-bottom: 12px;
  }
  .flow-wrap { position: relative; min-width: max-content; }
  .flow-header {
    display: flex;
    align-items: flex-end;
    position: sticky;
    top: 0;
    background: var(--bg);
    z-index: 10;
    padding: 6px 0 4px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 4px;
  }
  .flow-label-spacer { width: 80px; flex-shrink: 0; }
  .flow-time-axis { position: relative; height: 22px; flex-shrink: 0; }
  .flow-hour {
    position: absolute;
    font-size: 9px;
    letter-spacing: 1px;
    color: var(--muted);
    transform: translateX(-50%);
    white-space: nowrap;
  }
  .flow-grid { display: flex; flex-direction: column; gap: 2px; }
  .flow-row {
    display: flex;
    align-items: stretch;
    min-height: 62px;
    border-bottom: 1px solid rgba(255,255,255,0.03);
  }
  .flow-stage-label {
    width: 80px;
    flex-shrink: 0;
    position: sticky;
    left: 0;
    background: var(--bg);
    z-index: 5;
    font-size: 8px;
    letter-spacing: 1.5px;
    color: var(--muted);
    text-transform: uppercase;
    display: flex;
    align-items: center;

const POLL_NORMAL_MS  = 12_000;
// Festival window in absolute UTC, derived from BKS '26 (12–14 Jun, CEST).
// Fast polling kicks in from the gates opening on Friday until everyone is
// home on Monday morning.
const FAST_POLL_START = Date.UTC(2026, 5, 12, 8,  0, 0);   // 12 Jun 10:00 CEST
const FAST_POLL_END   = Date.UTC(2026, 5, 15, 4,  0, 0);   // 15 Jun 06:00 CEST

function currentPollMs() {
  const now = Date.now();
  return (now >= FAST_POLL_START && now <= FAST_POLL_END) ? POLL_FAST_MS : POLL_NORMAL_MS;
}

let db         = { marks: {}, members: {}, locations: {}, list: {}, priorities: {}, ratings: {} };
let mapStage   = '';
let myName     = localStorage.getItem('fp_name')  || '';
let myColor    = localStorage.getItem('fp_color') || '';
let activeDay  = 'friday';
let activeView = localStorage.getItem('fp_view') || 'home';
let filterBy        = 'all';
let showOnlyPicked  = false;

// ─── SYNC ─────────────────────────────────────────────────────────────────────
const configured = typeof JSONBIN_BIN_ID !== 'undefined'
                && JSONBIN_BIN_ID  !== 'YOUR_BIN_ID_HERE'
                && JSONBIN_API_KEY !== 'YOUR_API_KEY_HERE';

function syncUI(state, label) {
  document.getElementById('sync-dot').className   = 'sync-dot' + (state !== 'ok' ? ' ' + state : '');
  document.getElementById('sync-label').textContent = label;
}

async function loadDB() {
  if (!configured) {
    const s = localStorage.getItem('fp_state');
    if (s) db = JSON.parse(s);
    applyPending(db);
    syncUI('offline', 'local mode — see README to enable sync');
    return;
  }
  try {
    syncUI('syncing', 'syncing…');
    const r = await fetch(`https://api.jsonbin.io/v3/b/${JSONBIN_BIN_ID}/latest`, {
      headers: { 'X-Access-Key': JSONBIN_API_KEY }
    });
    if (!r.ok) throw new Error(r.status);
    const remote = (await r.json()).record || { marks:{}, members:{}, locations:{}, list:{} };
    db = remote;
    applyPending(db);
    repairMyColor();
    syncUI('ok', 'synced');
  } catch {
    syncUI('offline', 'offline');
  }
}

// Pending toggles the user has made locally that haven't been confirmed on the
// server yet. Keyed by act id, value is the desired marked state for myName.
// Re-applied after every load so a poll can't wipe an unsaved click.
let pendingToggles = {};
// Pending priority changes: { [actId]: 'M'|'S'|'C' }
let pendingPriorities = {};
// Pending star ratings: { [actId]: 1-5 }
let pendingRatings = {};
// Pending pin placement scoped to a specific act:
//   { actId, x, y, t } or { actId, clear: true, t }.
let pendingLocation = null;
// Pending bring-list operations to replay onto the merged state on save.
// Each op: { type:'add', id, text, addedBy, addedAt, priority }
//        | { type:'claim', id, name, want:bool }
//        | { type:'priority', id, priority:'M'|'S'|'C'|'W' }
//        | { type:'remove', id }
let pendingListOps = [];

function applyListOp(state, op) {
  state.list = state.list || {};
  if (op.type === 'add') {
    if (!state.list[op.id]) {
      state.list[op.id] = {
        text:      op.text,
        addedBy:   op.addedBy,
        addedAt:   op.addedAt,
        priority:  op.priority || 'S',
        claimedBy: []
      };
    }
  } else if (op.type === 'claim') {
    const item = state.list[op.id];
    if (!item) return;
    const claimers = (item.claimedBy || []).filter(n => n !== op.name);
    if (op.want) claimers.push(op.name);
    item.claimedBy = claimers;
  } else if (op.type === 'priority') {
    const item = state.list[op.id];
    if (item) item.priority = op.priority;
  } else if (op.type === 'remove') {
    delete state.list[op.id];
  }
}

function applyPending(state) {
  if (!state.marks)      state.marks      = {};
  if (!state.members)    state.members    = {};
  if (!state.locations)  state.locations  = {};
  if (!state.list)       state.list       = {};
  if (!state.priorities) state.priorities = {};
  if (!state.ratings)    state.ratings    = {};
  if (myName && myColor) state.members[myName] = myColor;
  if (myName) {
    for (const [actId, want] of Object.entries(pendingToggles)) {
      const list = (state.marks[actId] || []).filter(n => n !== myName);
      if (want) list.push(myName);
      if (list.length) state.marks[actId] = list; else delete state.marks[actId];
    }
    if (Object.keys(pendingPriorities).length) {
      state.priorities[myName] = { ...(state.priorities[myName] || {}), ...pendingPriorities };
    }
    if (Object.keys(pendingRatings).length) {
      state.ratings[myName] = { ...(state.ratings[myName] || {}), ...pendingRatings };
    }
    if (pendingLocation && pendingLocation.stage) {
      const stg = pendingLocation.stage;
      state.locations[stg] = state.locations[stg] || {};
      if (pendingLocation.clear) delete state.locations[stg][myName];
      else state.locations[stg][myName] = { x: pendingLocation.x, y: pendingLocation.y, t: pendingLocation.t };
      if (Object.keys(state.locations[stg]).length === 0) delete state.locations[stg];
    }
  }
  for (const op of pendingListOps) applyListOp(state, op);
}

// Debounced save: rapid clicks collapse into one fetch-merge-PUT cycle so
// concurrent edits from other devices aren't clobbered.
let saveTimer    = null;
let saveInFlight = false;
let deferredInstallPrompt = null;

function saveDB() {
  if (!configured) {
    localStorage.setItem('fp_state', JSON.stringify(db));
    return;
  }
  syncUI('syncing', 'saving…');
  clearTimeout(saveTimer);
  saveTimer = setTimeout(doSave, 600);
}

async function doSave() {
  if (saveInFlight) {                        // another save still running — try again shortly
    saveTimer = setTimeout(doSave, 300);
    return;
  }
  saveInFlight = true;
  const snapshotPending    = { ...pendingToggles };
  const snapshotPriorities = { ...pendingPriorities };
  const snapshotRatings    = { ...pendingRatings };
  const snapshotMembers    = myName ? { [myName]: db.members[myName] } : {};
  const snapshotLocation   = pendingLocation;
  const snapshotListOps    = pendingListOps.slice();
  try {
    // 1. Fetch fresh remote so we don't trample other devices' writes.
    const fr = await fetch(`https://api.jsonbin.io/v3/b/${JSONBIN_BIN_ID}/latest`, {
      headers: { 'X-Access-Key': JSONBIN_API_KEY }
    });
    if (!fr.ok) throw new Error('load: ' + fr.status);
    const remote = (await fr.json()).record || { marks:{}, members:{}, locations:{}, list:{}, priorities:{}, ratings:{} };

    // 2. Merge: keep everyone else's marks / pins / items, overlay our pending edits.
    const merged = {
      marks:      { ...(remote.marks   || {}) },
      members:    { ...(remote.members || {}), ...snapshotMembers },
      locations:  {},
      list:       {},
      priorities: {},
      ratings:    {}
    };
    for (const [name, prioMap] of Object.entries(remote.priorities || {})) {
      merged.priorities[name] = { ...(prioMap || {}) };
    }
    if (myName && Object.keys(snapshotPriorities).length) {
      merged.priorities[myName] = { ...(merged.priorities[myName] || {}), ...snapshotPriorities };
    }
    for (const [name, ratingMap] of Object.entries(remote.ratings || {})) {
      merged.ratings[name] = { ...(ratingMap || {}) };
    }
    if (myName && Object.keys(snapshotRatings).length) {
      merged.ratings[myName] = { ...(merged.ratings[myName] || {}), ...snapshotRatings };
    }
    for (const [aid, byName] of Object.entries(remote.locations || {})) {
      merged.locations[aid] = { ...byName };
    }
    // Deep-copy list items so we don't mutate the remote response.
    for (const [id, item] of Object.entries(remote.list || {})) {
      merged.list[id] = { ...item, claimedBy: [...(item.claimedBy || [])] };
    }
    for (const [actId, want] of Object.entries(snapshotPending)) {
      const list = (merged.marks[actId] || []).filter(n => n !== myName);
      if (want) list.push(myName);
      if (list.length) merged.marks[actId] = list; else delete merged.marks[actId];
    }
    if (snapshotLocation && snapshotLocation.stage && myName) {
      const stg = snapshotLocation.stage;
      merged.locations[stg] = merged.locations[stg] || {};
      if (snapshotLocation.clear) {
        delete merged.locations[stg][myName];
      } else {
        // Last-write-wins by timestamp; only overwrite if our snapshot is newer.
        const remoteLoc = merged.locations[stg][myName];
        if (!remoteLoc || (snapshotLocation.t || 0) >= (remoteLoc.t || 0)) {
          merged.locations[stg][myName] = { x: snapshotLocation.x, y: snapshotLocation.y, t: snapshotLocation.t };
        }
      }
      if (Object.keys(merged.locations[stg]).length === 0) delete merged.locations[stg];
    }
    // Replay our queued list operations onto the freshly-fetched state.
    for (const op of snapshotListOps) applyListOp(merged, op);

    // 3. PUT the merged state.
    const wr = await fetch(`https://api.jsonbin.io/v3/b/${JSONBIN_BIN_ID}`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json', 'X-Access-Key': JSONBIN_API_KEY },
      body: JSON.stringify(merged)
    });
    if (!wr.ok) throw new Error('save: ' + wr.status);

    // 4. Adopt merged state and drop pending toggles that we just persisted.
    //    Any toggle the user made *during* the save stays in pendingToggles
    //    (its value will differ from the snapshot) and triggers another save.
    db = merged;
    applyPending(db);
    for (const [k, v] of Object.entries(snapshotPending)) {
      if (pendingToggles[k] === v) delete pendingToggles[k];
    }
    for (const [k, v] of Object.entries(snapshotPriorities)) {
      if (pendingPriorities[k] === v) delete pendingPriorities[k];
    }
    for (const [k, v] of Object.entries(snapshotRatings)) {
      if (pendingRatings[k] === v) delete pendingRatings[k];
    }
    if (pendingLocation === snapshotLocation) pendingLocation = null;
    // Drop list ops we just persisted; any added during the save remain queued.
    if (snapshotListOps.length) {
      pendingListOps = pendingListOps.filter(op => !snapshotListOps.includes(op));
    }
    syncUI('ok', 'saved');
    render();
  } catch {
    syncUI('offline', 'save failed');         // pending toggles preserved → next click retries
  } finally {
    saveInFlight = false;
  }
}

// Returns a deterministic palette index based on a name string so two people
// healing duplicate colors simultaneously tend to land on different colors.
function nameHash(name) {
  return Math.abs(name.split('').reduce((h, c) => (h * 31 + c.charCodeAt(0)) | 0, 0));
}

function pickNewColor() {
  const used = new Set(Object.values(db.members).filter(c => c !== db.members[myName]));
  const start = myName ? nameHash(myName) % PALETTE.length : 0;
  for (let i = 0; i < PALETTE.length; i++) {
    const c = PALETTE[(start + i) % PALETTE.length];
    if (!used.has(c)) return c;
  }
  return PALETTE[start];
}

// If our stored color is the same as another member's, assign a new unique one
// and trigger a save so the fix propagates. Runs after every remote load.
function repairMyColor() {
  if (!myName || !db.members) return;
  const myStored = db.members[myName];
  if (!myStored) return;
  const othersColors = Object.entries(db.members)
    .filter(([n]) => n !== myName)
    .map(([, c]) => c);
  if (!othersColors.includes(myStored)) return;

  const used  = new Set(othersColors);
  const start = nameHash(myName) % PALETTE.length;
  let newColor = PALETTE[start];
  for (let i = 0; i < PALETTE.length; i++) {
    const c = PALETTE[(start + i) % PALETTE.length];
    if (!used.has(c)) { newColor = c; break; }
  }
  db.members[myName] = newColor;
  myColor = newColor;
  localStorage.setItem('fp_color', newColor);
  saveDB();
}

function joinFestival() {
  const name = document.getElementById('name-input').value.trim();
  if (!name) return;

  const existingColor = db.members[name];
  if (existingColor && name !== myName) {
    const proceed = confirm(
      `"${name}" already exists.\n\n` +
      `Continue as "${name}" on this device? Picks will sync across every device using this name.\n\n` +
      `Click Cancel to pick a different name instead.`
    );
    if (!proceed) {
      document.getElementById('name-input').focus();
      return;
    }
  }

  const color = existingColor || pickNewColor();
  myName  = name;
  myColor = color;
  db.members[name] = color;
  localStorage.setItem('fp_name',  name);
  localStorage.setItem('fp_color', color);
  saveDB();
  updateUserBar();
  render();
}

function joinAs(name) {
  const color = db.members[name];
  if (!color) return;
  myName  = name;
  myColor = color;
  localStorage.setItem('fp_name',  name);
  localStorage.setItem('fp_color', color);
  updateUserBar();
  render();
}

function leaveSession() {
  myName = ''; myColor = '';
  pendingToggles = {};
  pendingPriorities = {};
  pendingRatings = {};
  localStorage.removeItem('fp_name');
  localStorage.removeItem('fp_color');
  updateUserBar();
  render();
}

function updateUserBar() {
  const bar    = document.getElementById('name-bar');
  const active = document.getElementById('active-user');
  if (myName) {
    bar.style.display    = 'none';
    active.style.display = 'flex';
    document.getElementById('user-dot').style.background = myColor;
    document.getElementById('user-label').textContent    = myName;
  } else {
    bar.style.display    = 'flex';
    active.style.display = 'none';
  }
  renderExistingMembers();
}

function renderExistingMembers() {
  const container = document.getElementById('existing-members');
  const names = Object.keys(db.members || {}).sort((a,b) => a.localeCompare(b));
  if (myName || !names.length) {
    container.style.display = 'none';
    container.innerHTML = '';
    return;
  }
  container.style.display = 'flex';
  container.innerHTML = '';
  const label = document.createElement('span');
  label.className = 'filter-label';
  label.textContent = 'OR JOIN AS:';
  container.appendChild(label);
  names.forEach(name => {
    const color = db.members[name];
    const btn = document.createElement('button');
    btn.className = 'chip';
    btn.style.borderColor = color;
    btn.style.color = '#fff';
    const dot = document.createElement('span');
    dot.className = 'chip-dot';
    dot.style.background = color;
    btn.appendChild(dot);
    btn.appendChild(document.createTextNode(name));
    btn.onclick = () => joinAs(name);
    container.appendChild(btn);
  });
}

// ─── CONTROLS ─────────────────────────────────────────────────────────────────
function toggleMark(actId) {
  if (!myName) { document.getElementById('name-input').focus(); return; }
  const isMarked = (db.marks[actId] || []).includes(myName);
  pendingToggles[actId] = !isMarked;
  const list = (db.marks[actId] || []).filter(n => n !== myName);
  if (!isMarked) {
    list.push(myName);
    if (!((db.priorities || {})[myName] || {})[actId]) {
      db.priorities = db.priorities || {};
      db.priorities[myName] = db.priorities[myName] || {};
      db.priorities[myName][actId] = 'S';
      pendingPriorities[actId] = 'S';
    }
  }
  if (list.length) db.marks[actId] = list; else delete db.marks[actId];
  render();
  saveDB();
}

function cycleActPriority(actId) {
  if (!myName) return;
  const cycle = PRIORITY_CYCLE;
  const current = ((db.priorities || {})[myName] || {})[actId] || 'S';
  const next = cycle[current];
  db.priorities = db.priorities || {};
  db.priorities[myName] = db.priorities[myName] || {};
  db.priorities[myName][actId] = next;
  pendingPriorities[actId] = next;
  render();
  saveDB();
}

function setDay(day, el) {
  activeDay = day;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  render();
}

function setView(v) {
  activeView = v;
  localStorage.setItem('fp_view', v);
  document.body.dataset.view = v;
  document.getElementById('vt-home').classList.toggle('active',    v === 'home');
  document.getElementById('vt-stage').classList.toggle('active',   v === 'stage');
  document.getElementById('vt-flow').classList.toggle('active',    v === 'flow');
  document.getElementById('vt-summary').classList.toggle('active', v === 'summary');
  document.getElementById('vt-map').classList.toggle('active',     v === 'map');
  document.getElementById('vt-list').classList.toggle('active',    v === 'list');
  render();
}

function setFilter(name) {
  filterBy = name;
  render();
}

function togglePickedOnly() {
  showOnlyPicked = !showOnlyPicked;
  render();
}

// ─── HELPERS ──────────────────────────────────────────────────────────────────
function colorOf(name) {
  return db.members[name] || PALETTE[Object.keys(db.members).indexOf(name) % PALETTE.length] || '#888';
}

function rgba(hex, a) {
  const [r,g,b] = [1,3,5].map(i => parseInt(hex.slice(i,i+2),16));
  return `rgba(${r},${g},${b},${a})`;
}

// Pick black or white text for a given background so the letter stays legible
function textColor(hex) {
  const [r,g,b] = [1,3,5].map(i => parseInt(hex.slice(i,i+2),16));
  return (0.299*r + 0.587*g + 0.114*b) > 140 ? '#000' : '#fff';
}

// ─── RENDER ───────────────────────────────────────────────────────────────────
function render() {
  document.getElementById('loading').style.display = 'none';
  renderExistingMembers();
  renderMembersBar();
  document.getElementById('home-view').style.display    = activeView === 'home'    ? 'flex'  : 'none';
  document.getElementById('stage-view').style.display   = activeView === 'stage'   ? 'block' : 'none';
  document.getElementById('flow-view').style.display    = activeView === 'flow'    ? 'block' : 'none';
  document.getElementById('summary-view').style.display = activeView === 'summary' ? 'block' : 'none';
  document.getElementById('map-view').style.display     = activeView === 'map'     ? 'block' : 'none';
  document.getElementById('list-view').style.display    = activeView === 'list'    ? 'block' : 'none';
  if (activeView === 'home')         renderHomeView();
  else if (activeView === 'stage')   renderStageView();
  else if (activeView === 'flow')    renderFlowView();
  else if (activeView === 'summary') renderSummaryView();
  else if (activeView === 'map')     renderMapView();
  else                               renderListView();
}

function renderMembersBar() {
  const bar = document.getElementById('members-bar');
  bar.querySelectorAll('.mchip').forEach(c => c.remove());

  // all-chip
  const allChip = document.getElementById('chip-all');
  if (filterBy === 'all') {
    allChip.classList.add('active');
    allChip.style.cssText = '';
  } else {
    allChip.classList.remove('active');
  }

  // picked-only chip
  document.getElementById('chip-picked-only').classList.toggle('active', showOnlyPicked);

  const members = [...new Set(Object.values(db.marks).flat())];
  members.forEach(name => {
    const color   = colorOf(name);
    const count   = Object.values(db.marks).filter(v => v.includes(name)).length;
    const active  = filterBy === name;
    const btn     = document.createElement('button');
    btn.className = 'chip mchip' + (active ? ' active' : '');
    btn.style.borderColor = color;
    btn.style.color       = '#fff';
    if (active) btn.style.background = rgba(color, 0.2);
    btn.innerHTML = `<span class="chip-dot" style="background:${color}"></span>${name} <span style="opacity:0.55">(${count})</span>`;
    btn.onclick   = () => setFilter(filterBy === name ? 'all' : name);
    bar.appendChild(btn);
  });
}

function renderHomeView() {
  const memberCount = Object.keys(db.members || {}).length;
  const pickCount   = Object.keys(db.marks   || {}).length;
  const pinCount    = Object.values(db.locations || {})
    .reduce((sum, byName) => sum + Object.keys(byName).length, 0);
  const itemCount   = Object.keys(db.list || {}).length;

  const prompt = document.getElementById('home-hero-prompt');
  prompt.textContent = myName
    ? `🎉 You're in as ${myName}. Pick any feature below.`
    : '👇 Type your name in the bar above to get started.';

  const stats = document.getElementById('home-stats');
  if (memberCount) {
    const parts = [
      `<strong>${memberCount}</strong> ${memberCount === 1 ? 'person' : 'people'}`,
      `<strong>${pickCount}</strong> act${pickCount === 1 ? '' : 's'} picked`
    ];
    if (pinCount)  parts.push(`<strong>${pinCount}</strong> pin${pinCount === 1 ? '' : 's'} on the map`);
    if (itemCount) parts.push(`<strong>${itemCount}</strong> on the bring list`);
    stats.innerHTML = parts.map(p => `<span>${p}</span>`).join('');
    stats.style.display = 'flex';
  } else {
    stats.style.display = 'none';
    stats.innerHTML = '';
  }

  document.getElementById('home-subscribe').innerHTML = subscribeCTA();
  renderInstallCTA();
  updateCountdown();
}

function renderStageView() {
  const day  = DAYS[activeDay];
  let acts = filterBy === 'all'
    ? day.acts
    : day.acts.filter(a => (db.marks[a.id] || []).includes(filterBy));
  if (showOnlyPicked) acts = acts.filter(a => (db.marks[a.id] || []).length > 0);

  const byStage = Object.fromEntries(day.stages.map(s => [s, []]));
  acts.forEach(a => { if (byStage[a.stage]) byStage[a.stage].push(a); });

  const cols = day.stages.map(stage => {
    const stageActs = byStage[stage].sort((a,b) => timeToMins(a.start) - timeToMins(b.start));
    if (!stageActs.length && (filterBy !== 'all' || showOnlyPicked)) return '';
    const cards = stageActs.length
      ? stageActs.map(renderCard).join('')
      : '<div style="padding:8px 4px;font-size:10px;color:#2a2a2a">—</div>';
    return `<div class="stage-col">
      <div class="stage-header">${stage}</div>
      <div class="stage-acts">${cards}</div>
    </div>`;
  }).join('');

  document.getElementById('stage-view').innerHTML = `<div class="stage-grid">${cols}</div>`;
}

function actPriority(actId, name) {
  return ((db.priorities || {})[name || myName] || {})[actId] || 'S';
}

function setActRating(actId, stars) {
  if (!myName) return;
  db.ratings = db.ratings || {};
  db.ratings[myName] = db.ratings[myName] || {};
  const current = db.ratings[myName][actId];
  const next = current === stars ? 0 : stars;   // tap same star to clear
  if (next) db.ratings[myName][actId] = next;
  else delete db.ratings[myName][actId];
  pendingRatings[actId] = next || null;
  render();
  saveDB();
}

function avgRating(actId) {
  const scores = Object.values(db.ratings || {})
    .map(m => m[actId])
    .filter(Boolean);
  if (!scores.length) return null;
  return scores.reduce((a, b) => a + b, 0) / scores.length;
}

function renderCard(act) {
  const members  = db.marks[act.id] || [];
  const isMarked = myName && members.includes(myName);
  const mc       = myName ? (db.members[myName] || myColor || PALETTE[0]) : PALETTE[0];

  const style = isMarked
    ? `style="background:${rgba(mc,0.12)};border-color:${mc}"`
    : '';

  const p = isMarked ? actPriority(act.id) : null;
  const badge = p
    ? `<button class="act-priority-badge ${p}" onclick="event.stopPropagation();cycleActPriority('${act.id}')" title="Priority: ${PRIORITY_LABEL[p]} — click to change">${p}</button>`
    : '';

  const dots = members.map(n => {
    const c = colorOf(n);
    return `<span class="act-dot" style="background:${c};color:${textColor(c)}" title="${n}">${n[0].toUpperCase()}</span>`;
  }).join('');

  const avg = avgRating(act.id);
  const avgHtml = avg ? `<div class="act-avg-rating">${'★'.repeat(Math.round(avg))}${'☆'.repeat(5-Math.round(avg))} ${avg.toFixed(1)}</div>` : '';

  return `<div class="act-card${isMarked?' marked':''}" ${style} onclick="toggleMark('${act.id}')">
    <div class="act-name">${act.name}${badge}</div>
    <div class="act-time">${act.start}–${act.end}</div>
    ${avgHtml}
    ${dots ? `<div class="act-dots">${dots}</div>` : ''}
  </div>`;
}

// webcal:// URL of the daily-regenerated combined feed (see
// .github/workflows/generate-ics.yml). Returns null when running off
// file:// where webcal: handlers can't reach a real host.
function subscribeUrl() {
  if (location.protocol === 'file:') return null;
  const dir = location.pathname.replace(/[^/]*$/, '');
  return `webcal://${location.host}${dir}calendar/everyone.ics`;
}

function subscribeCTA() {
  const url = subscribeUrl();
  if (!url) return '';
  return `<div class="subscribe-cta">
    <div class="subscribe-cta-icon">📅</div>
    <div class="subscribe-cta-text">
      <div class="subscribe-cta-title">ADD TO YOUR CALENDAR</div>
      <div class="subscribe-cta-sub">Live feed of every pick — refreshes daily, your calendar stays in sync without opening this app.</div>
    </div>
    <a class="subscribe-btn" href="${url}" title="Opens in your calendar app · webcal://">SUBSCRIBE →</a>
  </div>`;
}

function subscribePillHTML() {
  const url = subscribeUrl();
  return url
    ? `<a class="subscribe-pill" href="${url}" title="Live calendar feed · refreshes daily">📅 SUBSCRIBE</a>`
    : '';
}

function summaryStatsHTML(memberCount, totalPicks) {
  const pill = subscribePillHTML();
  if (!memberCount) return pill ? `<div class="summary-stats">${pill}</div>` : '';
  return `<div class="summary-stats">
    <span>${memberCount} ${memberCount === 1 ? 'person' : 'people'} · ${totalPicks} act${totalPicks === 1 ? '' : 's'} picked</span>
    ${pill}
  </div>`;
}

// ─── FLOW / TIMELINE VIEW ─────────────────────────────────────────────────────
const FLOW_MIN_M  = 720;   // 12:00 in timeToMins space
const FLOW_MAX_M  = 1680;  // 04:00 next day in timeToMins space
const PX_PER_MIN  = 2.5;
const FLOW_LABEL  = 80;    // px width of sticky stage-name column

function renderFlowView() {
  const day  = DAYS[activeDay];
  let acts   = filterBy === 'all'
    ? day.acts
    : day.acts.filter(a => (db.marks[a.id] || []).includes(filterBy));
  if (showOnlyPicked) acts = acts.filter(a => (db.marks[a.id] || []).length > 0);

  const totalW = Math.round((FLOW_MAX_M - FLOW_MIN_M) * PX_PER_MIN);

  // Hour tick marks (12:00 → 04:00 next day)
  const hours = [];
  for (let h = 12; h <= 28; h++) {
    const x = Math.round((h * 60 - FLOW_MIN_M) * PX_PER_MIN);
    const label = String(h < 24 ? h : h - 24).padStart(2, '0') + ':00';
    hours.push({ x, label });
  }

  const gridLines = hours.map(({ x }) =>
    `<div class="flow-gridline" style="left:${FLOW_LABEL + x}px"></div>`
  ).join('');

  const timeAxis = hours.map(({ x, label }) =>
    `<span class="flow-hour" style="left:${x}px">${label}</span>`
  ).join('');

  const mc = myName ? (db.members[myName] || myColor || PALETTE[0]) : PALETTE[0];

  const rows = day.stages.map(stage => {
    const stageActs = acts.filter(a => a.stage === stage);
    if (!stageActs.length) return '';

    const blocks = stageActs.map(act => {
      const members  = db.marks[act.id] || [];
      const isMarked = myName && members.includes(myName);
      const sM = timeToMins(act.start);
      const eM = timeToMins(act.end);
      const left  = Math.round((sM - FLOW_MIN_M) * PX_PER_MIN);
      const width = Math.max(Math.round((eM - sM) * PX_PER_MIN) - 2, 4);

      const bg          = isMarked ? rgba(mc, 0.2) : (members.length ? 'rgba(255,255,255,0.05)' : 'var(--surface)');
      const borderColor = isMarked ? mc             : (members.length ? '#333' : 'var(--border)');

      const dots = members.slice(0, 5).map(n => {
        const c = colorOf(n);
        return `<span class="act-dot" style="background:${c};color:${textColor(c)}" title="${n}">${n[0].toUpperCase()}</span>`;
      }).join('');

      const p = isMarked ? actPriority(act.id) : null;
      const flowBadge = p && width >= 36
        ? `<button class="act-priority-badge ${p}" style="display:block;margin-top:2px" onclick="event.stopPropagation();cycleActPriority('${act.id}')">${p}</button>`
        : '';

      return `<div class="flow-act${isMarked ? ' marked' : ''}"
          style="left:${left}px;width:${width}px;background:${bg};border-color:${borderColor}"
          onclick="toggleMark('${act.id}')">
        <div class="flow-act-name">${act.name}</div>
        ${width >= 90  ? `<div class="flow-act-time">${act.start}–${act.end}</div>` : ''}
        ${flowBadge}
        ${width >= 36 && dots ? `<div class="act-dots" style="margin-top:auto">${dots}</div>` : ''}
      </div>`;
    }).join('');

    return `<div class="flow-row">
      <div class="flow-stage-label">${stage}</div>
      <div class="flow-acts" style="width:${totalW}px">${blocks}</div>
    </div>`;
  }).filter(Boolean).join('');

  document.getElementById('flow-view').innerHTML = `<div class="flow-wrap">
    ${gridLines}
    <div class="flow-header">
      <div class="flow-label-spacer"></div>
      <div class="flow-time-axis" style="width:${totalW}px">${timeAxis}</div>
    </div>
    ${rows
      ? `<div class="flow-grid">${rows}</div>`
      : `<div class="empty-msg">NO ACTS MATCH THE CURRENT FILTER</div>`}
  </div>`;
}

function renderSummaryView() {
  const view    = document.getElementById('summary-view');
  const members = [...new Set(Object.values(db.marks).flat())];
  const stats   = summaryStatsHTML(members.length, Object.keys(db.marks).length);

  if (!members.length) {
    view.innerHTML = stats + '<div class="empty-msg">NO PICKS YET — START MARKING ACTS</div>';
    return;
  }

  const allActs = Object.values(DAYS).flatMap(d => d.acts);

  const html = members.map(name => {
    const color  = colorOf(name);
    const picked = Object.entries(db.marks)
      .filter(([,v]) => v.includes(name))
      .map(([id]) => allActs.find(a => a.id === id))
      .filter(Boolean)
      .sort((a, b) => {
        const pa = PRIORITY_ORDER.indexOf(actPriority(a.id, name));
        const pb = PRIORITY_ORDER.indexOf(actPriority(b.id, name));
        return pa !== pb ? pa - pb : timeToMins(a.start) - timeToMins(b.start);
      });

    const tags = picked.map(a => {
      const p = actPriority(a.id, name);
      const isMe = name === myName;
      const badge = isMe
        ? `<button class="act-priority-badge ${p}" onclick="event.stopPropagation();cycleActPriority('${a.id}')">${p}</button>`
        : `<span class="act-priority-badge ${p}" style="pointer-events:none;cursor:default">${p}</span>`;

      const myRating = isMe ? (((db.ratings || {})[myName] || {})[a.id] || 0) : 0;
      const theirRating = !isMe ? (((db.ratings || {})[name] || {})[a.id] || 0) : 0;
      const stars = isMe
        ? `<div class="act-stars">${[1,2,3,4,5].map(n =>
            `<button class="act-star${myRating >= n ? ' filled' : ''}" onclick="setActRating('${a.id}',${n})">★</button>`
          ).join('')}<span class="act-star-label">${myRating ? myRating + '/5' : 'rate it'}</span></div>`
        : theirRating
          ? `<div class="act-stars">${'★'.repeat(theirRating)}${'☆'.repeat(5-theirRating)}</div>`
          : '';

      return `<div class="summary-tag" style="border-color:${rgba(color,0.3)}">
        <span class="s-stage" style="color:${color}">${a.stage}</span>
        ${a.name} ${badge}
        <span class="s-time">${a.start}–${a.end}</span>
        ${stars}
      </div>`;
    }).join('');

    return `<div class="summary-person">
      <h3 style="color:${color}">
        <span class="s-dot" style="background:${color}"></span>
        ${name} — ${picked.length} act${picked.length !== 1 ? 's' : ''}
      </h3>
      <div class="summary-acts">${tags}</div>
    </div>`;
  }).join('');

  view.innerHTML = stats + html;
}


// ─── MAP VIEW (per-act) ───────────────────────────────────────────────────────
const STALE_PIN_MS = 2 * 60 * 60 * 1000;   // dim pins older than 2h

function relativeTime(t) {
  if (!t) return '';
  const d = Date.now() - t;
  if (d < 60_000)         return 'just now';
  if (d < 3_600_000)      return Math.floor(d / 60_000) + ' min ago';
  if (d < 24 * 3_600_000) return Math.floor(d / 3_600_000) + ' h ago';
  return Math.floor(d / (24 * 3_600_000)) + ' d ago';
}

function findActById(actId) {
  for (const d of Object.values(DAYS)) {
    const a = d.acts.find(x => x.id === actId);
    if (a) return a;
  }
  return null;
}

const ALL_STAGES = Object.values(DAYS)[0].stages;

function pickDefaultMapStage() {
  return ALL_STAGES[0] || '';
}

function populateMapStageSelect() {
  const sel = document.getElementById('map-stage-select');
  const prev = mapStage || sel.value;
  sel.innerHTML = '';
  ALL_STAGES.forEach(s => {
    const pinCount = ((db.locations || {})[s]) ? Object.keys(db.locations[s]).length : 0;
    const opt = document.createElement('option');
    opt.value = s;
    opt.textContent = s + (pinCount ? `  · ${pinCount} 📍` : '');
    sel.appendChild(opt);
  });
  if (prev && sel.querySelector(`option[value="${CSS.escape(prev)}"]`)) {
    sel.value = prev;
    mapStage = prev;
  } else {
    mapStage = pickDefaultMapStage();
    if (mapStage) sel.value = mapStage;
  }
}

function onMapStageChange(stage) {
  mapStage = stage;
  renderMapView();
}

function renderMapView() {
  populateMapStageSelect();
  const canvas = document.getElementById('map-canvas');
  canvas.querySelectorAll('.map-pin').forEach(p => p.remove());

  const help     = document.getElementById('map-help');
  const empty    = document.getElementById('map-empty');
  const clearBtn = document.getElementById('clear-pin-btn');

  if (!mapStage) {
    help.textContent = 'No stage selected.';
    empty.style.display = 'flex';
    clearBtn.style.display = 'none';
    return;
  }

  const locsForStage = (db.locations && db.locations[mapStage]) || {};
  const names = Object.keys(locsForStage);
  empty.style.display = names.length ? 'none' : 'flex';

  names.forEach(name => {
    const loc = locsForStage[name];
    if (!loc || typeof loc.x !== 'number' || typeof loc.y !== 'number') return;
    const color = colorOf(name);
    const stale = loc.t && (Date.now() - loc.t > STALE_PIN_MS);
    const pin   = document.createElement('div');
    pin.className = 'map-pin' + (name === myName ? ' is-me' : '') + (stale ? ' stale' : '');
    pin.style.left  = (Math.max(0, Math.min(1, loc.x)) * 100) + '%';
    pin.style.top   = (Math.max(0, Math.min(1, loc.y)) * 100) + '%';
    pin.style.color = color;
    const when = relativeTime(loc.t);
    pin.title = when ? `${name} · ${when}` : name;
    const dot = document.createElement('div');
    dot.className = 'map-pin-dot';
    dot.style.background = color;
    dot.innerHTML = `<span style="color:${textColor(color)}">${name[0].toUpperCase()}</span>`;
    const label = document.createElement('div');
    label.className = 'map-pin-label';
    label.textContent = name;
    if (when) {
      const sub = document.createElement('span');
      sub.className = 'map-pin-time';
      sub.textContent = when;
      label.appendChild(sub);
    }
    pin.appendChild(dot);
    pin.appendChild(label);
    canvas.appendChild(pin);
  });

  help.textContent = myName
    ? `📍 Tap anywhere on the map to drop your pin at ${mapStage}. Others see it within seconds.`
    : '📍 Join with a name first to drop a pin.';
  clearBtn.style.display = (myName && locsForStage[myName]) ? 'inline-block' : 'none';
}

function setMyLocation(e) {
  if (!myName) {
    setView('stage');
    document.getElementById('name-input').focus();
    return;
  }
  if (!mapStage) return;
  if (e.target.closest('.map-pin')) return;
  const canvas = document.getElementById('map-canvas');
  const rect   = canvas.getBoundingClientRect();
  const x = (e.clientX - rect.left) / rect.width;
  const y = (e.clientY - rect.top)  / rect.height;
  if (x < 0 || x > 1 || y < 0 || y > 1) return;
  const t = Date.now();
  db.locations = db.locations || {};
  db.locations[mapStage] = db.locations[mapStage] || {};
  db.locations[mapStage][myName] = { x, y, t };
  pendingLocation = { stage: mapStage, x, y, t };
  renderMapView();
  saveDB();
}

function clearMyLocation() {
  if (!myName || !mapStage) return;
  if (db.locations && db.locations[mapStage]) {
    delete db.locations[mapStage][myName];
    if (Object.keys(db.locations[mapStage]).length === 0) delete db.locations[mapStage];
  }
  pendingLocation = { stage: mapStage, clear: true, t: Date.now() };
  renderMapView();
  saveDB();
}


async function shareMapLink() {
  const url = location.origin + location.pathname + '#map';
  const text = myName
    ? `Join ${myName} on the BKS '26 planner map`
    : 'Open the BKS \'26 planner map';
  if (navigator.share) {
    try {
      await navigator.share({ title: 'BKS \'26 Map', text, url });
      setMapShareStatus('Shared!', 2500);
    } catch (e) {
      if (e.name !== 'AbortError') await copyMapLink(url);
    }
  } else {
    await copyMapLink(url);
  }
}

async function copyMapLink(url) {
  try {
    await navigator.clipboard.writeText(url);
    setMapShareStatus('Link copied!', 2500);
  } catch {
    setMapShareStatus('Could not copy link', 3000);
  }
}

function setMapShareStatus(msg, clearAfterMs) {
  const el = document.getElementById('map-share-status');
  if (!el) return;
  el.textContent = msg;
  if (clearAfterMs) setTimeout(() => { if (el.textContent === msg) el.textContent = ''; }, clearAfterMs);
}

// ─── BRING LIST ───────────────────────────────────────────────────────────────
function newListId() {
  return 'l_' + Date.now().toString(36) + '_' + Math.random().toString(36).slice(2, 7);
}

function addListItem() {
  if (!myName) {
    setView('stage');
    document.getElementById('name-input').focus();
    return;
  }
  const input = document.getElementById('list-input');
  const text  = input.value.trim();
  if (!text) return;
  const op = {
    type:     'add',
    id:       newListId(),
    text,
    addedBy:  myName,
    addedAt:  Date.now(),
    priority: 'S'
  };
  pendingListOps.push(op);
  applyListOp(db, op);
  input.value = '';
  renderListView();
  saveDB();
}

function toggleListClaim(id) {
  if (!myName) {
    setView('stage');
    document.getElementById('name-input').focus();
    return;
  }
  const item = (db.list || {})[id];
  if (!item) return;
  const want = !((item.claimedBy || []).includes(myName));
  const op = { type: 'claim', id, name: myName, want };
  pendingListOps.push(op);
  applyListOp(db, op);
  renderListView();
  saveDB();
}

function removeListItem(id) {
  const op = { type: 'remove', id };
  pendingListOps.push(op);
  applyListOp(db, op);
  renderListView();
  saveDB();
}

const PRIORITY_ORDER = ['M', 'S', 'C'];
const PRIORITY_LABEL = { M: 'Must Have', S: 'Should Have', C: 'Could Have' };
const PRIORITY_CYCLE = { M: 'S', S: 'C', C: 'M' };

function setListPriority(id) {
  const item = (db.list || {})[id];
  if (!item) return;
  const next = PRIORITY_CYCLE[item.priority || 'S'];
  const op = { type: 'priority', id, priority: next };
  pendingListOps.push(op);
  applyListOp(db, op);
  renderListView();
  saveDB();
}

function renderListView() {
  const container = document.getElementById('list-items');
  const empty     = document.getElementById('list-empty');
  const items = Object.entries(db.list || {})
    .filter(([, it]) => it && typeof it.text === 'string')
    .sort((a, b) => {
      const pa = PRIORITY_ORDER.indexOf(a[1].priority || 'S');
      const pb = PRIORITY_ORDER.indexOf(b[1].priority || 'S');
      return pa !== pb ? pa - pb : (a[1].addedAt || 0) - (b[1].addedAt || 0);
    });

  empty.style.display = items.length ? 'none' : 'block';
  container.innerHTML = '';

  let lastPriority = null;
  items.forEach(([id, item]) => {
    const p = item.priority || 'S';

    if (p !== lastPriority) {
      const section = document.createElement('div');
      section.className = 'list-priority-section';
      section.textContent = PRIORITY_LABEL[p];
      container.appendChild(section);
      lastPriority = p;
    }

    const claimers = item.claimedBy || [];
    const mineClaimed = myName && claimers.includes(myName);

    const card = document.createElement('div');
    card.className = 'list-item' + (claimers.length ? ' claimed' : '');

    const top = document.createElement('div');
    top.className = 'list-item-top';

    const badge = document.createElement('button');
    badge.className = `list-priority-badge ${p}`;
    badge.textContent = p;
    badge.title = `Priority: ${PRIORITY_LABEL[p]} — click to change`;
    badge.onclick = () => setListPriority(id);
    top.appendChild(badge);

    const text = document.createElement('span');
    text.className = 'list-item-text';
    text.textContent = item.text;
    top.appendChild(text);

    const remove = document.createElement('button');
    remove.className = 'list-item-remove';
    remove.textContent = '✕';
    remove.title = 'Remove from list';
    remove.onclick = () => removeListItem(id);
    top.appendChild(remove);
    card.appendChild(top);

    if (item.addedBy) {
      const meta = document.createElement('div');
      meta.className = 'list-item-meta';
      meta.textContent = `added by ${item.addedBy}`;
      card.appendChild(meta);
    }

    const claims = document.createElement('div');
    claims.className = 'list-item-claims';
    claimers.forEach(n => {
      const c   = colorOf(n);
      const chip = document.createElement('span');
      chip.className = 'list-claim-chip';
      chip.style.borderColor = c;
      const dot = document.createElement('span');
      dot.className = 'chip-dot';
      dot.style.background = c;
      chip.appendChild(dot);
      chip.appendChild(document.createTextNode(n));
      claims.appendChild(chip);
    });
    const btn = document.createElement('button');
    btn.className = 'list-claim-btn' + (mineClaimed ? ' active' : '');
    btn.textContent = mineClaimed ? "✓ I'm bringing this" : "+ I'll bring it";
    btn.onclick = () => toggleListClaim(id);
    claims.appendChild(btn);
    card.appendChild(claims);

    container.appendChild(card);
  });
}


// ─── SORT ACTS BY START TIME ──────────────────────────────────────────────────
function timeToMins(t) {
  const [h, m] = t.split(':').map(Number);
  // Treat times before 06:00 as next-day (after midnight)
  return (h < 6 ? h + 24 : h) * 60 + m;
}
Object.values(DAYS).forEach(day => {
  day.acts.sort((a, b) => timeToMins(a.start) - timeToMins(b.start));
});

// ─── BOOT ─────────────────────────────────────────────────────────────────────
document.getElementById('name-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') joinFestival();
});

document.getElementById('map-canvas').addEventListener('click', setMyLocation);

document.getElementById('list-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') addListItem();
});

if (myName) updateUserBar();

// Hash deep-link: ?#map opens the map directly (used by the share link).
if (location.hash === '#map') activeView = 'map';

// Sync the tab highlight to the persisted view (HTML hard-codes Home as active).
setView(activeView);

// Recursive setTimeout so each tick can recompute the cadence — no need to
// reload the page on the day the festival starts.
function schedulePoll() {
  if (!configured) return;
  setTimeout(async () => {
    await loadDB();
    render();
    schedulePoll();
  }, currentPollMs());
}

// ─── INSTALL CTA ──────────────────────────────────────────────────────────────
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredInstallPrompt = e;
  renderInstallCTA();
});

window.addEventListener('appinstalled', () => {
  deferredInstallPrompt = null;
  localStorage.setItem('fp_installed', '1');
  renderInstallCTA();
});

function isIosSafari() {
  const ua = navigator.userAgent;
  return /iP(hone|ad|od)/.test(ua) && /WebKit/.test(ua) && !/CriOS|FxiOS|EdgiOS/.test(ua);
}

function renderInstallCTA() {
  const el = document.getElementById('home-install');
  if (!el) return;
  const standalone = window.matchMedia('(display-mode: standalone)').matches || navigator.standalone;
  if (standalone || localStorage.getItem('fp_installed') || localStorage.getItem('fp_install_dismissed')) {
    el.innerHTML = '';
    return;
  }
  if (deferredInstallPrompt) {
    el.innerHTML = `<div class="install-cta">
      <div class="install-cta-icon">📲</div>
      <div class="install-cta-body">
        <div class="install-cta-title">Add to home screen</div>
        <div class="install-cta-desc">Install for quick access — no app store needed.</div>
      </div>
      <button class="install-cta-btn" onclick="triggerInstall()">Install</button>
      <button class="install-cta-dismiss" onclick="dismissInstall()" aria-label="Dismiss">✕</button>
    </div>`;
    return;
  }
  if (isIosSafari()) {
    el.innerHTML = `<div class="install-cta">
      <div class="install-cta-icon">📲</div>
      <div class="install-cta-body">
        <div class="install-cta-title">Add to home screen</div>
        <div class="install-cta-desc">Tap <strong>Share ↑</strong> then <strong>Add to Home Screen</strong>.</div>
      </div>
      <button class="install-cta-dismiss" onclick="dismissInstall()" aria-label="Dismiss">✕</button>
    </div>`;
    return;
  }
  el.innerHTML = '';
}

async function triggerInstall() {
  if (!deferredInstallPrompt) return;
  deferredInstallPrompt.prompt();
  const { outcome } = await deferredInstallPrompt.userChoice;
  deferredInstallPrompt = null;
  if (outcome === 'accepted') localStorage.setItem('fp_installed', '1');
  renderInstallCTA();
}

function dismissInstall() {
  localStorage.setItem('fp_install_dismissed', '1');
  renderInstallCTA();
}

function updateCountdown() {
  const el      = document.getElementById('countdown');
  const heading = document.getElementById('countdown-heading');
  if (!el) return;
  const now  = Date.now();
  if (now >= FAST_POLL_END) {
    el.style.display      = 'none';
    heading.style.display = 'none';
    return;
  }
  const diff = FAST_POLL_START - now;
  if (diff <= 0) {
    el.innerHTML = '<span class="countdown-live">Festival is live! 🎉</span>';
    heading.style.display = 'none';
    return;
  }
  const d   = Math.floor(diff / 86400000);
  const h   = Math.floor((diff % 86400000) / 3600000);
  const m   = Math.floor((diff % 3600000)  / 60000);
  const s   = Math.floor((diff % 60000)    / 1000);
  const pad = n => String(n).padStart(2, '0');
  const sep = '<span class="countdown-sep">:</span>';
  const unit = (n, label) =>
    `<div class="countdown-unit"><span class="countdown-num">${n}</span><span class="countdown-label">${label}</span></div>`;
  el.innerHTML = unit(d, 'days') + sep + unit(pad(h), 'hrs') + sep + unit(pad(m), 'min') + sep + unit(pad(s), 'sec');
}
setInterval(updateCountdown, 1000);
updateCountdown();
window.addEventListener('pageshow', updateCountdown);

loadDB().then(() => {
  if (myName && db.members[myName]) myColor = db.members[myName];
  render();
  schedulePoll();
});
</script>
