<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <radialGradient id="glow" cx="20%" cy="0%" r="80%">
      <stop offset="0%" stop-color="#FF5C4D" stop-opacity="0.30"/>
      <stop offset="55%" stop-color="#FF5C4D" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#FF5C4D" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="100%" cy="100%" r="70%">
      <stop offset="0%" stop-color="#FFD166" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#FFD166" stop-opacity="0"/>
    </radialGradient>
    <pattern id="dots" x="0" y="0" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1" fill="#ffffff" fill-opacity="0.05"/>
    </pattern>
  </defs>

  <rect width="1200" height="630" fill="#0a0a0a"/>
  <rect width="1200" height="630" fill="url(#dots)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>

  <!-- Title (sized to fit on one line with the pin on the right) -->
  <text x="80" y="220"
        font-family="'Bebas Neue', 'Oswald', 'Arial Narrow', 'Impact', sans-serif"
        font-size="88" font-weight="700"
        fill="#ffffff" letter-spacing="4">BEST KEPT SECRET</text>

  <!-- Year + role -->
  <text x="80" y="310"
        font-family="'Bebas Neue', 'Oswald', 'Arial Narrow', 'Impact', sans-serif"
        font-size="68" font-weight="700"
        fill="#FF5C4D" letter-spacing="8">'26 · PLANNER</text>

  <!-- Subtitle -->
  <text x="82" y="380"
        font-family="'Space Mono', ui-monospace, Menlo, Consolas, monospace"
        font-size="22"
        fill="#888888" letter-spacing="6">12–14 JUNE · BEEKSE BERGEN</text>

  <!-- Tagline -->
  <text x="80" y="465"
        font-family="'Space Mono', ui-monospace, Menlo, Consolas, monospace"
        font-size="26"
        fill="#f0f0f0" letter-spacing="2">Mark acts · Find each other · Pack together</text>

  <!-- Member dots showing the palette -->
  <g transform="translate(80, 540)">
    <circle cx="0"   cy="0" r="20" fill="#E6194B" stroke="#0a0a0a" stroke-width="3"/>
    <circle cx="46"  cy="0" r="20" fill="#3CB44B" stroke="#0a0a0a" stroke-width="3"/>
    <circle cx="92"  cy="0" r="20" fill="#FFE119" stroke="#0a0a0a" stroke-width="3"/>
    <circle cx="138" cy="0" r="20" fill="#4363D8" stroke="#0a0a0a" stroke-width="3"/>
    <circle cx="184" cy="0" r="20" fill="#F58231" stroke="#0a0a0a" stroke-width="3"/>
    <circle cx="230" cy="0" r="20" fill="#911EB4" stroke="#0a0a0a" stroke-width="3"/>
    <circle cx="276" cy="0" r="20" fill="#42D4F4" stroke="#0a0a0a" stroke-width="3"/>
    <circle cx="322" cy="0" r="20" fill="#F032E6" stroke="#0a0a0a" stroke-width="3"/>
  </g>

  <!-- Right side: festival pin marker, smaller and pushed further right -->
  <g transform="translate(1060, 380)">
    <path d="M 0,-90 C -45,-90 -75,-58 -75,-26 C -75,22 -8,82 0,115 C 8,82 75,22 75,-26 C 75,-58 45,-90 0,-90 Z"
          fill="#FF5C4D" stroke="#ffffff" stroke-width="5"/>
    <circle cx="0" cy="-26" r="28" fill="#0a0a0a"/>
    <text x="0" y="-15"
          font-family="'Bebas Neue', 'Oswald', 'Arial Narrow', 'Impact', sans-serif"
          font-size="38" font-weight="700"
          text-anchor="middle"
          fill="#ffffff">B</text>
  </g>
</svg>
